{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "code-kebab.fullname" . }}
  labels:
    {{- include "code-kebab.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "code-kebab.gatewayName" . }}
      {{- if .Values.gateway.https.enabled }}
      sectionName: https
      {{- else if .Values.gateway.http.enabled }}
      sectionName: http
      {{- else }}
      {{- fail "Enable gateway.http.enabled or gateway.https.enabled when gateway.enabled=true." }}
      {{- end }}
  hostnames:
    - {{ .Values.gateway.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.gateway.route.pathPrefix | quote }}
      backendRefs:
        - name: {{ include "code-kebab.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
