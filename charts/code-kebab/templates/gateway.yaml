{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "code-kebab.gatewayName" . }}
  labels:
    {{- include "code-kebab.labels" . | nindent 4 }}
    {{- with .Values.gateway.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  gatewayClassName: {{ .Values.gateway.gatewayClassName | quote }}
  {{- with .Values.gateway.infrastructure }}
  infrastructure:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  listeners:
    {{- if .Values.gateway.http.enabled }}
    - name: http
      hostname: {{ .Values.gateway.hostname | quote }}
      port: {{ .Values.gateway.http.port }}
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    {{- end }}
    {{- if .Values.gateway.https.enabled }}
    - name: https
      hostname: {{ .Values.gateway.hostname | quote }}
      port: {{ .Values.gateway.https.port }}
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ include "code-kebab.gatewayTlsSecretName" . }}
      allowedRoutes:
        namespaces:
          from: Same
    {{- end }}
{{- end }}
