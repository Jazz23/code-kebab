apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hcloud-token
  namespace: kube-system
spec:
  refreshInterval: 48h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azurekv-cluster-secret-store
  target:
    name: hcloud
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: secret/hetzner-token
